<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Research | María Alejandra Schild</title>
    <meta
      name="description"
      content="Research page for a bilingual academic website."
    />
    <script>
      window.__assetVersion = Date.now().toString();

      const stylesheet = document.createElement("link");
      stylesheet.rel = "stylesheet";
      stylesheet.href = `assets/styles.css?v=${window.__assetVersion}`;
      document.head.appendChild(stylesheet);
    </script>
    <script type="module">
      import(`./assets/app.js?v=${window.__assetVersion}`);
    </script>
  </head>
  <body data-page="research">
    <div class="page-chrome">
      <header class="site-header">
        <div class="shell nav-shell">
          <a class="brand" href="index.html" id="brand-name"></a>
          <nav class="site-nav" id="site-nav" aria-label="Primary"></nav>
          <div class="language-switch" aria-label="Language switcher">
            <button type="button" data-lang-option="en">EN</button>
            <button type="button" data-lang-option="es">ES</button>
          </div>
        </div>
      </header>

      <main class="shell page-shell">
        <header class="page-header">
          <h1 class="visually-hidden" id="page-title"></h1>
          <p class="page-summary" id="page-summary"></p>
        </header>

        <section class="list-section research-section">
          <div class="entry-list paper-list" id="research-list"></div>
        </section>
      </main>

      <footer class="site-footer">
        <div class="shell footer-shell" id="footer-shell">
          <p id="footer-text"></p>
        </div>
      </footer>
    </div>
  </body>
</html>
